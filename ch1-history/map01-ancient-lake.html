  <title>① 古代滇池范围复原 — 滇池交互式地图集</title>

<body>
  <!-- Navigation -->
  <script>document.write(generateNavBar('01'));</script>

  <div class="page-wrapper">
    <!-- Map -->
    <div id="map-container">
      <div id="map"></div>
      <div class="info-banner">💡 点击各时期水域多边形查看详细历史信息</div>
    </div>

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-content" id="sidebar-content">
        <div class="sidebar-title">📜 古代滇池范围复原</div>
        <p style="font-size:13px;color:#666;margin-bottom:12px;">
          滇池古称"滇南泽"，汉代面积约510 km²，是今天的1.65倍。两千年来，自然淤积与人类围垦使湖面持续萎缩。
        </p>
        <div class="sidebar-empty" id="sidebar-placeholder">👆 点击地图上的水域范围查看详细信息</div>
      </div>
    </aside>
  </div>

  <!-- Shared Scripts -->
  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/utils.js"></script>

    // 唐代滇池范围 (~450 km²)
    const tangLake = {

      "geometry": { "type": "Polygon", "coordinates": [[

        [102.710, 24.728], [102.688, 24.712], [102.668, 24.702], [102.650, 24.698],

        [102.595, 24.772], [102.595, 24.795], [102.602, 24.820], [102.612, 24.845],

      "properties": { "name": "明代滇池范围", "period": "明代（约公元1368-1644年）", "year": "明代", "area_km2": 380, "description": "明代滇池面积约380 km²。明初大量移民入滇屯田，兴修水利。洪武年间疏浚海口河（螳螂川），加速湖水下泄，湖面进一步缩小。北岸盘龙江三角洲显著推进，东岸也出现大面积围垦。" },
      "geometry": { "type": "Polygon", "coordinates": [[

        [102.608, 24.778], [102.608, 24.800], [102.612, 24.822], [102.620, 24.845],

        [102.720, 25.025]
      ]]}
    };
  </script>

  <!-- Map Script -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const map = initStandardMap('map');

      const periodColors = {
        '汉代': { fill: '#c0392b', stroke: '#922b21', fillOpacity: 0.35 },
        '唐代': { fill: '#e67e22', stroke: '#ba4a00', fillOpacity: 0.35 },
        '明代': { fill: '#f39c12', stroke: '#b7950b', fillOpacity: 0.35 },
        '清代': { fill: '#27ae60', stroke: '#1e8449', fillOpacity: 0.35 }
      };

      // 现代基准（浅蓝色）
      const modernLayer = L.geoJSON(modernLake, {
        style: { fillColor: '#3498db', fillOpacity: 0.15, color: '#2980b9', weight: 1, dashArray: '5,5' },
      }).addTo(map);
      modernLayer.bindPopup('<div class="popup-content"><h3 class="popup-title">现代滇池（2023年）</h3><p><strong>面积：</strong>309.5 km²</p><p class="popup-desc">当前水域范围，作为对比基准</p></div>');

      // 四个历史时期图层
      const layers = {};
      const features = { '汉代': hanLake, '唐代': tangLake, '明代': mingLake, '清代': qingLake };

      Object.keys(features).forEach(period => {
        const f = features[period];
        const style = periodColors[period];
        const layer = L.geoJSON(f, {
          style: { fillColor: style.fill, color: style.stroke, fillOpacity: style.fillOpacity, weight: 2.5 },
          onEachFeature: function(feature, lyr) {
            lyr.bindPopup(createPopupContent(feature.properties));
            lyr.on('click', function() {
              // Update sidebar
              const p = feature.properties;
              document.getElementById('sidebar-placeholder').style.display = 'none';
              document.getElementById('sidebar-content').innerHTML = `
                <div class="sidebar-title">📜 ${p.period}</div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;">
                  <div style="background:#f0f4f8;padding:10px;border-radius:8px;text-align:center;">
                    <div style="font-size:24px;font-weight:bold;color:#1a5276;">${p.area_km2}</div>
                    <div style="font-size:11px;color:#888;">面积 (km²)</div>
                  </div>
                  <div style="background:#f0f4f8;padding:10px;border-radius:8px;text-align:center;">
                    <div style="font-size:24px;font-weight:bold;color:#c0392b;">${(510-p.area_km2).toFixed(0)}</div>
                    <div style="font-size:11px;color:#888;">缩减量 (km²)</div>
                  </div>
                </div>
                <p style="font-size:13px;color:#555;line-height:1.7;">${p.description}</p>
                <div style="margin-top:10px;padding-top:10px;border-top:1px solid #eee;font-size:11px;color:#999;">
                  与现代相比：减少 ${(p.area_km2-309.5).toFixed(0)} km² (${((p.area_km2-309.5)/p.area_km2*100).toFixed(1)}%)
                </div>
              `;
            });
          }
        });
        layers[period] = layer;
        // 默认全部显示
        layer.addTo(map);
      });

      // 历史时期切换
      const overlayControl = L.control.layers(null, layers, { position: 'topright', collapsed: false }).addTo(map);

      // 图例
      const legend = L.control({ position: 'bottomleft' });
      legend.onAdd = function() {
        const div = L.DomUtil.create('div');
        div.innerHTML = `
          <div class="info-legend">
            <h4>图例</h4>
            <div class="legend-item"><i style="background:#c0392b;opacity:0.6;"></i> 汉代 (~510 km²)</div>
            <div class="legend-item"><i style="background:#e67e22;opacity:0.6;"></i> 唐代 (~450 km²)</div>
            <div class="legend-item"><i style="background:#f39c12;opacity:0.6;"></i> 明代 (~380 km²)</div>
            <div class="legend-item"><i style="background:#27ae60;opacity:0.6;"></i> 清代 (~340 km²)</div>
            <div class="legend-item"><i style="background:#3498db;opacity:0.3;border:1px dashed #2980b9;"></i> 现代 (309 km²)</div>
          </div>
        `;
        return div;
      };
      legend.addTo(map);
    });
  </script>
</body>
</html>
