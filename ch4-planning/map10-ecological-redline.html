  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const map = initStandardMap('map', { zoom: 12 });

      // 三级管控颜色
      const levelColors = {
        1: { fill: '#c0392b', stroke: '#922b21', opacity: 0.35, label: '一级管控区' },
        2: { fill: '#e74c3c', stroke: '#c0392b', opacity: 0.30, label: '二级管控区' },
        3: { fill: '#f5b7b1', stroke: '#e74c3c', opacity: 0.25, label: '一般生态空间' }
      };

      // 分区图层
      L.geoJSON(modernLake, {
        style: { fillColor: '#3498db', fillOpacity: 0.2, color: '#2980b9', weight: 2 }
      }).addTo(map).bindPopup('<b>滇池水域</b><br>一级管控区：最严格保护');

      const zoneLayer = L.geoJSON(redlineZones, {
        style: function(feature) {
          const c = levelColors[feature.properties.levelNum];
          return {
            fillColor: c.fill, fillOpacity: c.opacity,
            color: c.stroke, weight: feature.properties.levelNum === 1 ? 3 : 2,
            dashArray: feature.properties.levelNum === 3 ? '5,5' : null
          };
        },
        onEachFeature: function(feature, layer) {
          layer.bindPopup(createPopupContent(feature.properties));
          layer.on('click', function() {
            const p = feature.properties;
            document.getElementById('zone-detail').innerHTML = `
              <div class="zone-detail">
                <div class="zone-name">🛡 ${p.name}</div>
                <div style="display:inline-block;padding:4px 14px;border-radius:20px;font-size:12px;font-weight:bold;margin-bottom:10px;
                  ${p.levelNum===1?'background:#c0392b;color:white;':p.levelNum===2?'background:#e74c3c;color:white;':'background:#f5b7b1;color:#c0392b;'}">
                  ${p.level}
                </div>
                <div class="zone-info">
                  <div class="info-item"><div class="info-label">管控面积</div><div class="info-value">${p.area_km2.toFixed(0)} km²</div></div>
                  <div class="info-item"><div class="info-label">法律依据</div><div class="info-value" style="font-size:12px;">${p.law}</div></div>
                </div>
                <h4>✅ 允许的活动</h4>
                <ul class="allowed-list"><li>${p.allowed.replace(/, /g, '</li><li>')}</li></ul>
                <h4>🚫 禁止的活动</h4>
                <ul class="forbidden-list"><li>${p.forbidden.replace(/, /g, '</li><li>')}</li></ul>
                <div style="margin-top:10px;padding:10px;background:#fff3f3;border-radius:6px;font-size:12px;color:#c0392b;">
                  ⚖ <strong>罚则：</strong>${p.penalty}
                </div>
              </div>
            `;
          });
        }
      }).addTo(map);

      // 图例
      const legend = L.control({ position: 'bottomleft' });
      legend.onAdd = function() {
        const div = L.DomUtil.create('div');
        div.innerHTML = `
          <div class="info-legend">
            <h4>生态红线图例</h4>
            <div class="legend-item"><i style="background:#c0392b;opacity:0.5;"></i> 一级管控区（核心保护）</div>
            <div class="legend-item"><i style="background:#e74c3c;opacity:0.4;"></i> 二级管控区（限制开发）</div>
            <div class="legend-item"><i style="background:#f5b7b1;opacity:0.3;border:1px dashed #e74c3c;"></i> 一般生态空间</div>
            <hr style="margin:4px 0;">
            <small style="color:#888;">法律依据：<br>《云南省滇池保护条例》</small>
          </div>
        `;
        return div;
      };
      legend.addTo(map);
    });
  </script>
</body>
</html>
