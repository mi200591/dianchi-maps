<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⑪ 2030未来情景模拟 — 滇池交互式地图集</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <link rel="stylesheet" href="../assets/css/main.css" />

</head>
<body>
  <script>document.write(generateNavBar('11'));</script>

  <div class="page-wrapper">
    <div id="map-container">
      <div id="map"></div>
      <!-- 切换控件 -->
      <div class="toggle-container" style="top:10px;right:10px;">
        <span style="font-weight:bold;" id="toggle-label">🏞 当前状态</span>
        <label class="toggle-switch">
          <input type="checkbox" id="scenario-toggle">
          <span class="toggle-slider"></span>
        </label>
        <span style="font-weight:bold;color:#27ae60;" id="toggle-label-future">🔮 2030模拟</span>
      </div>
      <!-- 统计面板 -->
      <div class="stats-panel" id="stats">
        <div class="stat-label">🌊 湖泊面积</div>
        <div class="stat-value" id="stat-area">309.5 km²</div>
        <div class="stat-label" style="margin-top:8px;">🌿 环湖湿地</div>
        <div class="stat-value" id="stat-wetland">约35 km²</div>
      </div>
    </div>

    <aside id="sidebar" class="sidebar">
      <div class="sidebar-content">
        <div class="sidebar-title">🔮 2030未来情景模拟</div>
        <p style="font-size:13px;color:#666;margin-bottom:12px;">
          基于《滇池流域水环境保护治理"十四五"规划》和《昆明市国土空间总体规划（2021-2035）》模拟的2030年滇池生态恢复情景。
        </p>
        <div id="scenario-info">
          <div class="zone-detail">
            <div class="zone-name">📋 规划要点</div>
            <div class="zone-info">
              <div class="info-item"><div class="info-label">目标水质</div><div class="info-value" style="color:#27ae60;">Ⅳ类→Ⅲ类</div></div>
              <div class="info-item"><div class="info-label">环湖湿地率</div><div class="info-value" style="color:#27ae60;">≥55%</div></div>
              <div class="info-item"><div class="info-label">生态岸线比例</div><div class="info-value" style="color:#27ae60;">≥80%</div></div>
              <div class="info-item"><div class="info-label">湖滨缓冲带</div><div class="info-value" style="color:#27ae60;">≥200m</div></div>
            </div>
            <p style="font-size:13px;color:#555;line-height:1.6;">
              到2030年，滇池流域将全面建成"一环四带"的生态保护格局。预计完成全部退塘还湖工程，新增环湖湿地面积15 km²，恢复生态岸线30公里，湖滨缓冲带宽度达到200米以上。
            </p>
          </div>
        </div>
      </div>
    </aside>
  </div>

  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/utils.js"></script>

  <script>
    // 当前状态数据
    const currentLake = {"type":"Feature","properties":{"name":"当前滇池(2023)","area_km2":309.5},"geometry":{"type":"Polygon","coordinates":[[[102.718,25.020],[102.730,25.008],[102.742,24.990],[102.755,24.960],[102.768,24.930],[102.775,24.900],[102.778,24.870],[102.775,24.840],[102.770,24.810],[102.762,24.780],[102.748,24.755],[102.730,24.735],[102.708,24.720],[102.685,24.710],[102.668,24.705],[102.655,24.708],[102.642,24.715],[102.632,24.730],[102.625,24.750],[102.622,24.770],[102.625,24.790],[102.632,24.815],[102.640,24.840],[102.645,24.865],[102.648,24.890],[102.652,24.915],[102.658,24.940],[102.668,24.960],[102.680,24.978],[102.692,24.995],[102.705,25.008],[102.718,25.020]]]}};

    const currentWetlands = {"type":"FeatureCollection","features":[
      {"type":"Feature","properties":{"name":"宝丰湿地"},"geometry":{"type":"Polygon","coordinates":[[[102.720,24.975],[102.735,24.970],[102.742,24.958],[102.738,24.945],[102.725,24.940],[102.712,24.945],[102.708,24.958],[102.712,24.970],[102.720,24.975]]]}},
      {"type":"Feature","properties":{"name":"海东湿地"},"geometry":{"type":"Polygon","coordinates":[[[102.740,24.910],[102.758,24.905],[102.765,24.892],[102.760,24.878],[102.748,24.872],[102.735,24.878],[102.730,24.892],[102.735,24.905],[102.740,24.910]]]}},
      {"type":"Feature","properties":{"name":"斗南湿地"},"geometry":{"type":"Polygon","coordinates":[[[102.758,24.888],[102.775,24.882],[102.782,24.870],[102.778,24.856],[102.762,24.850],[102.750,24.855],[102.745,24.868],[102.750,24.880],[102.758,24.888]]]}}
    ]};

    // 2030年模拟数据
    const futureLake = {"type":"Feature","properties":{"name":"2030年滇池(模拟)","area_km2":312},"geometry":{"type":"Polygon","coordinates":[[[102.718,25.021],[102.731,25.009],[102.744,24.991],[102.758,24.962],[102.770,24.932],[102.777,24.902],[102.780,24.872],[102.777,24.841],[102.771,24.811],[102.762,24.781],[102.749,24.756],[102.731,24.736],[102.709,24.721],[102.686,24.711],[102.669,24.706],[102.656,24.709],[102.643,24.716],[102.633,24.731],[102.626,24.751],[102.623,24.771],[102.626,24.791],[102.633,24.816],[102.641,24.841],[102.646,24.866],[102.649,24.891],[102.653,24.916],[102.659,24.941],[102.669,24.961],[102.681,24.979],[102.693,24.996],[102.706,25.009],[102.718,25.021]]]}};

    const futureWetlands = {"type":"FeatureCollection","features":[
      {"type":"Feature","properties":{"name":"宝丰湿地(扩建)"},"geometry":{"type":"Polygon","coordinates":[[[102.718,24.978],[102.738,24.972],[102.748,24.958],[102.742,24.942],[102.728,24.936],[102.710,24.940],[102.705,24.955],[102.708,24.970],[102.718,24.978]]]}},
      {"type":"Feature","properties":{"name":"海东湿地(扩建)"},"geometry":{"type":"Polygon","coordinates":[[[102.738,24.912],[102.762,24.908],[102.770,24.890],[102.765,24.874],[102.748,24.868],[102.732,24.874],[102.725,24.892],[102.732,24.905],[102.738,24.912]]]}},
      {"type":"Feature","properties":{"name":"斗南湿地(扩建)"},"geometry":{"type":"Polygon","coordinates":[[[102.755,24.890],[102.778,24.885],[102.785,24.868],[102.780,24.852],[102.762,24.846],[102.748,24.852],[102.742,24.868],[102.745,24.882],[102.755,24.890]]]}},
      {"type":"Feature","properties":{"name":"大渔湾生态湿地(新建)"},"geometry":{"type":"Polygon","coordinates":[[[102.755,24.795],[102.775,24.790],[102.782,24.775],[102.778,24.758],[102.762,24.752],[102.748,24.755],[102.742,24.770],[102.745,24.785],[102.755,24.795]]]}},
      {"type":"Feature","properties":{"name":"官渡生态廊道(扩建)"},"geometry":{"type":"Polygon","coordinates":[[[102.700,24.985],[102.728,24.980],[102.738,24.965],[102.735,24.948],[102.718,24.942],[102.698,24.945],[102.690,24.960],[102.692,24.975],[102.700,24.985]]]}},
      {"type":"Feature","properties":{"name":"晋城生态修复区(扩建)"},"geometry":{"type":"Polygon","coordinates":[[[102.692,24.718],[102.715,24.715],[102.722,24.702],[102.720,24.688],[102.705,24.682],[102.690,24.685],[102.682,24.698],[102.685,24.710],[102.692,24.718]]]}}
    ]};

    // 2030年规划项目点
    const futureProjects = [
      { name: '环湖截污完善工程', lat: 24.960, lng: 102.715, desc: '完善环湖截污干管，实现污水全收集全处理' },
      { name: '入湖河道综合整治', lat: 24.990, lng: 102.710, desc: '盘龙江等35条入湖河道生态化改造' },
      { name: '湖滨缓冲带建设', lat: 24.880, lng: 102.770, desc: '建设200米以上湖滨生态缓冲带' },
      { name: '外来物种防控站', lat: 24.850, lng: 102.685, desc: '防控水葫芦、福寿螺等外来入侵物种' },
      { name: '土著鱼类保护中心', lat: 24.720, lng: 102.700, desc: '滇池金线鲃、银白鱼等土著鱼类增殖放流' },
      { name: '智慧水环境监测平台', lat: 24.940, lng: 102.700, desc: '建设全天候水质在线监测网络' }
    ];
  </script>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const map = initStandardMap('map', { zoom: 12 });

      let currentMode = 'current'; // 'current' or 'future'
      let lakeLayer, wetlandLayer, projectMarkers;

      function showCurrent() {
        if (lakeLayer) map.removeLayer(lakeLayer);
        if (wetlandLayer) map.removeLayer(wetlandLayer);
        if (projectMarkers) projectMarkers.forEach(m => map.removeLayer(m));

        lakeLayer = L.geoJSON(currentLake, {
          style: { fillColor: '#3498db', fillOpacity: 0.3, color: '#2980b9', weight: 2.5 }
        }).addTo(map);
        lakeLayer.bindPopup('<b>当前滇池（2023年）</b><br>水域面积：309.5 km²');

        wetlandLayer = L.geoJSON(currentWetlands, {
          style: { fillColor: '#27ae60', fillOpacity: 0.45, color: '#1e8449', weight: 1.5 }
        }).addTo(map);
        wetlandLayer.eachLayer(l => l.bindPopup('<b>' + l.feature.properties.name + '</b><br>已建成'));

        document.getElementById('stat-area').textContent = '309.5 km²';
        document.getElementById('stat-wetland').textContent = '约35 km²';
        document.getElementById('toggle-label').style.fontWeight = 'bold';
        document.getElementById('toggle-label').style.color = '#2c3e50';
        document.getElementById('toggle-label-future').style.fontWeight = 'normal';
        document.getElementById('toggle-label-future').style.color = '#999';
      }

      function showFuture() {
        if (lakeLayer) map.removeLayer(lakeLayer);
        if (wetlandLayer) map.removeLayer(wetlandLayer);
        if (projectMarkers) projectMarkers.forEach(m => map.removeLayer(m));

        lakeLayer = L.geoJSON(futureLake, {
          style: { fillColor: '#27ae60', fillOpacity: 0.3, color: '#1e8449', weight: 2.5, dashArray: '8,4' }
        }).addTo(map);
        lakeLayer.bindPopup('<b>2030年滇池（模拟）</b><br>预计水域面积：~312 km²<br>生态修复后岸线更自然化');

        wetlandLayer = L.geoJSON(futureWetlands, {
          style: { fillColor: '#2ecc71', fillOpacity: 0.5, color: '#27ae60', weight: 2, dashArray: '4,3' },
          onEachFeature: function(f, l) {
            l.bindPopup('<b>🆕 ' + f.properties.name + '</b><br>2030年规划建成');
          }
        }).addTo(map);

        // 规划项目标记
        projectMarkers = futureProjects.map(p => {
          const icon = L.divIcon({
            className: 'custom-marker',
            html: '<div style="width:20px;height:20px;background:#8e44ad;border-radius:50%;border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;color:white;font-size:10px;">★</div>',
            iconSize: [24, 24], iconAnchor: [12, 12], popupAnchor: [0, -12]
          });
          const m = L.marker([p.lat, p.lng], { icon: icon }).addTo(map);
          m.bindPopup('<b>📌 ' + p.name + '</b><br>' + p.desc);
          return m;
        });

        document.getElementById('stat-area').textContent = '~312 km²';
        document.getElementById('stat-wetland').textContent = '约50 km²';
        document.getElementById('toggle-label').style.fontWeight = 'normal';
        document.getElementById('toggle-label').style.color = '#999';
        document.getElementById('toggle-label-future').style.fontWeight = 'bold';
        document.getElementById('toggle-label-future').style.color = '#27ae60';
      }

      // 初始化当前状态
      showCurrent();

      // 切换事件
      document.getElementById('scenario-toggle').addEventListener('change', function() {
        if (this.checked) {
          currentMode = 'future';
          showFuture();
        } else {
          currentMode = 'current';
          showCurrent();
        }
      });

      // 图例
      const legend = L.control({ position: 'bottomleft' });
      legend.onAdd = function() {
        const div = L.DomUtil.create('div');
        div.innerHTML = `
          <div class="info-legend">
            <h4>图例</h4>
            <div class="legend-item"><i style="background:#3498db;opacity:0.4;"></i> 当前水域 (309.5 km²)</div>
            <div class="legend-item"><i style="background:#27ae60;opacity:0.4;border:2px dashed #1e8449;background:rgba(39,174,96,0.3);"></i> 2030模拟水域 (~312 km²)</div>
            <div class="legend-item"><i style="background:#27ae60;opacity:0.5;"></i> 已建湿地</div>
            <div class="legend-item"><i style="background:#2ecc71;opacity:0.5;border:2px dashed #27ae60;"></i> 规划湿地</div>
            <div class="legend-item"><i style="background:#8e44ad;width:14px;height:14px;border-radius:50%;"></i> 规划重点项目</div>
            <hr style="margin:4px 0;">
            <small style="color:#888;">🔘 点击切换按钮对比</small>
          </div>
        `;
        return div;
      };
      legend.addTo(map);
    });
  </script>
</body>
</html>
