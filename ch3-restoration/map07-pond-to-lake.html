  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const map = initStandardMap('map', { zoom: 12 });

      // 现代滇池
      L.geoJSON(modernLake, {
        style: { fillColor: '#3498db', fillOpacity: 0.2, color: '#2980b9', weight: 2 }
      }).addTo(map);

      // 阶段颜色
      const phaseColors = {
        '第一期': { fill: '#3498db', stroke: '#2471a3' },
        '第二期': { fill: '#2ecc71', stroke: '#1e8449' },
        '第三期': { fill: '#27ae60', stroke: '#1e8449' }
      };

      // 政策分区图层
      const zoneLayer = L.geoJSON(policyZones, {
        style: function(feature) {
          const c = phaseColors[feature.properties.phase];
          const isComplete = feature.properties.status === '已完成';
          return {
            fillColor: c.fill, fillOpacity: isComplete ? 0.5 : 0.35,
            color: c.stroke, weight: 2,
            dashArray: isComplete ? null : '6,4'
          };
        },
        onEachFeature: function(feature, layer) {
          layer.bindPopup(createPopupContent(feature.properties));
          layer.on('click', function() {
            const p = feature.properties;
            document.getElementById('zone-detail').innerHTML = `
              <div class="zone-detail">
                <div class="zone-name">🌿 ${p.name}</div>
                <div class="zone-info">
                  <div class="info-item">
                    <div class="info-label">实施阶段</div>
                    <div class="info-value">${p.phase}</div>
                  </div>
                  <div class="info-item">
                    <div class="info-label">实施年份</div>
                    <div class="info-value">${p.year}</div>
                  </div>
                  <div class="info-item">
                    <div class="info-label">退让面积</div>
                    <div class="info-value">${formatMu(p.area_mu)}</div>
                  </div>
                  <div class="info-item">
                    <div class="info-label">投资金额</div>
                    <div class="info-value">${(p.investment/10000).toFixed(1)} 亿元</div>
                  </div>
                  <div class="info-item">
                    <div class="info-label">实施状态</div>
                    <div class="info-value" style="color:${p.status==='已完成'?'#27ae60':'#e67e22'}">${p.status}</div>
                  </div>
                </div>
                <p style="font-size:13px;color:#555;line-height:1.6;">${p.description}</p>
                <h4>✅ 允许活动</h4>
                <ul class="allowed-list"><li>${p.allowed.replace(/, /g, '</li><li>')}</li></ul>
                <h4>🚫 禁止活动</h4>
                <ul class="forbidden-list"><li>${p.forbidden.replace(/, /g, '</li><li>')}</li></ul>
              </div>
            `;
          });
        }
      }).addTo(map);

      // 图例
      const legend = L.control({ position: 'bottomleft' });
      legend.onAdd = function() {
        const total = policyZones.features.reduce((s,f)=>s+f.properties.area_mu, 0);
        const complete = policyZones.features.filter(f=>f.properties.status==='已完成').reduce((s,f)=>s+f.properties.area_mu, 0);
        const div = L.DomUtil.create('div');
        div.innerHTML = `
          <div class="info-legend">
            <h4>退塘还湖图例</h4>
            <div class="legend-item"><i style="background:#3498db;opacity:0.6;"></i> 第一期 (2015-2018)</div>
            <div class="legend-item"><i style="background:#2ecc71;opacity:0.6;"></i> 第二期 (2018-2020)</div>
            <div class="legend-item"><i style="background:#27ae60;opacity:0.5;"></i> 第三期 (2020-2023)</div>
            <div class="legend-item"><i style="border:2px dashed #888;background:transparent;"></i> 施工中</div>
            <hr style="margin:4px 0;">
            <small>总退让：${formatMu(total)}</small><br>
            <small>已完成：${formatMu(complete)}</small>
          </div>
        `;
        return div;
      };
      legend.addTo(map);
    });
  </script>
</body>
</html>
