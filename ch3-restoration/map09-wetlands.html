<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⑨ 湿地与生物多样性点位 — 滇池交互式地图集</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="stylesheet" href="../assets/css/map-base.css" />
  <style>
    .detail-card {
      background: white;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 14px;
      border-left: 5px solid #27ae60;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      transition: all 0.2s;
    }
    .detail-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.1); }
    .detail-card .card-title { font-size: 17px; font-weight: bold; color: #1a5276; margin-bottom: 8px; }
    .detail-card .card-meta { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 8px; }
    .detail-card .card-meta span { font-size: 12px; color: #888; }
    .detail-card .card-body { font-size: 13px; color: #555; line-height: 1.6; }
    .detail-card .card-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .detail-card .tag { display: inline-block; padding: 3px 10px; border-radius: 14px; font-size: 11px; font-weight: bold; }
    .tag-bird { background: #e8f8f5; color: #16a085; }
    .tag-plant { background: #eaf7ea; color: #27ae60; }
    .tag-fish { background: #eef6fc; color: #2980b9; }
    .tag-type { background: #fef9e7; color: #e67e22; }
  </style>
</head>
<body>
  <script>document.write(generateNavBar('09'));</script>

  <div class="page-wrapper">
    <div id="map-container">
      <div id="map"></div>
      <div class="info-banner">💡 点击湿地标记查看详细信息卡片</div>
    </div>

    <aside id="sidebar" class="sidebar">
      <div class="sidebar-content" id="sidebar-content">

        </p>
        <div id="wetland-cards">
          <div class="sidebar-empty">👆 点击地图上的湿地标记查看详细物种信息</div>
        </div>
      </div>
    </aside>
  </div>

  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/utils.js"></script>

  <script>

      },
      {
        name: '西山森林公园（湖滨段）', lat: 24.862, lng: 102.635, type: '森林-湿地过渡带',

        plants: '云南松、华山松、滇青冈、杜鹃、山茶',

        species: 210,
        desc: '西山与滇池之间的生态过渡带，森林物种极为丰富。是昆明近郊生物多样性最高的区域之一，兼具森林和湿地鸟类群落。'

  </script>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const map = initStandardMap('map', { zoom: 12 });

      // 滇池基准
      L.geoJSON(modernLake, {
        style: { fillColor: '#3498db', fillOpacity: 0.15, color: '#2980b9', weight: 2 }
      }).addTo(map);

      // 类型颜色映射
      const typeColors = {
        '湖滨生态湿地': '#27ae60',
        '复合型湿地': '#2ecc71',
        '城市滨湖湿地': '#3498db',
        '人工湿地': '#2980b9',
        '自然恢复湿地': '#16a085',
        '河口湿地': '#1abc9c',
        '恢复中湿地': '#f39c12',
        '森林-湿地过渡带': '#8e44ad'
      };

      const typeIcons = {
        '湖滨生态湿地': '🌿',
        '复合型湿地': '🌾',
        '城市滨湖湿地': '🏞',
        '人工湿地': '🏗',
        '自然恢复湿地': '🌱',
        '河口湿地': '💧',
        '恢复中湿地': '🚧',
        '森林-湿地过渡带': '🌲'
      };

      // 创建标记
      wetlandSites.forEach(site => {
        const color = typeColors[site.type] || '#27ae60';
        const icon = L.divIcon({
          className: 'custom-marker',
          html: `<div style="width:${site.type==='森林-湿地过渡带'?14:12}px;height:${site.type==='森林-湿地过渡带'?14:12}px;background:${color};border-radius:50%;border:3px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.3);"></div>`,
          iconSize: [18, 18], iconAnchor: [9, 9], popupAnchor: [0, -9]
        });

        const marker = L.marker([site.lat, site.lng], { icon: icon }).addTo(map);
        marker.bindPopup(`<b>${typeIcons[site.type]||''} ${site.name}</b><br>${site.type}<br>物种数：${site.species} 种`);

        marker.on('click', function() {
          const cardsDiv = document.getElementById('wetland-cards');
          cardsDiv.innerHTML = `
            <div class="detail-card">
              <div class="card-title">${typeIcons[site.type]||''} ${site.name}</div>
              <div class="card-meta">
                <span>📐 ${formatMu(site.area_mu)}</span>
                <span>📅 ${site.year}</span>
                <span>🦉 ${site.species} 种</span>
              </div>
              <div class="card-body">${site.desc}</div>
              <div class="card-tags">
                <span class="tag tag-type">${site.type}</span>
                <span class="tag tag-bird">🦆 ${site.birds.substring(0,12)}...</span>
                <span class="tag tag-plant">🌿 ${site.plants.substring(0,12)}...</span>
                <span class="tag tag-fish">🐟 ${site.fishes.substring(0,12)}...</span>
              </div>
            </div>
          `;
        });
      });

      // 侧边栏初始显示所有湿地概览
      const allCards = wetlandSites.map((s, i) => `
        <div class="detail-card" id="card-${i}">
          <div class="card-title">${typeIcons[s.type]||''} ${s.name}</div>
          <div class="card-meta">
            <span>📐 ${formatMu(s.area_mu)}</span>
            <span>🦉 ${s.species} 种</span>
            <span title="${s.type}">🏷 ${s.type}</span>
          </div>
          <div class="card-body">${s.desc.substring(0, 80)}...</div>
        </div>
      `).join('');
      document.getElementById('wetland-cards').innerHTML = allCards;

      // 点击侧边栏卡片时定位到地图
      wetlandSites.forEach((site, i) => {
        setTimeout(() => {
          const card = document.getElementById('card-' + i);
          if (card) {
            card.style.cursor = 'pointer';
            card.addEventListener('click', () => {
              map.setView([site.lat, site.lng], 15);
            });
          }
        }, 100);
      });

      // 图例
      const legend = L.control({ position: 'bottomleft' });
      legend.onAdd = function() {
        let items = '';
        Object.keys(typeColors).forEach(t => {
          items += `<div class="legend-item"><i style="background:${typeColors[t]};border-radius:50%;"></i> ${t}</div>`;
        });
        const div = L.DomUtil.create('div');
        div.innerHTML = `
          <div class="info-legend">
            <h4>湿地类型图例</h4>
            ${items}
            <hr style="margin:4px 0;">
            <small>共 ${wetlandSites.length} 处湿地 | 物种总计：${wetlandSites.reduce((s,w)=>s+w.species,0)} 种</small>
          </div>
        `;
        return div;
      };
      legend.addTo(map);
    });
  </script>
</body>
</html>
